<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Product Page</title> 
    <link rel="stylesheet" href="./assets/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>
<body> 
      <header class="py-[24px] md:py-[18px] fixed top-0 left-0  w-full bg-white z-10">
        <div class="container mx-auto flex items-center justify-between">
            <div class="menue block lg:hidden">
                <a href="#"><img class="w-6 md:hidden" src="assets/imgs/menue.svg" alt="Menue"></a>
            </div>
            <div class="logo">
                <img src="assets/imgs/logo-mn.svg" alt="Logo">
            </div>
            <nav class="list hidden md:block">
                <ul class="flex gap-[32px] text-[16px] ">
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="./index.html">HOME</a></li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="./Product-listing.html">COLLECTIONS</a>
                    </li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">NEW ARRIVALS</a>
                    </li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">SHOP</a></li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">ABOUT M&N</a></li>
                </ul>
            </nav>
            <div class="icons flex gap-[25.5px]">
                <a href="#"><img src="assets/imgs/heart.svg" alt="Cart"></a>
                <a class="Wishlist hidden md:block " href="#"><img src="assets/imgs/cart.svg" alt="Wishlist"></a>
            </div> 
            
        </div>

    </header> 

    <section class=" mt-25"> 
        <div class="container mx-auto flex gap-16"> 
            <div class="w-[550px] shrink-0">
                <div>
                    <img src="./assets/imgs/فستان بيج سنجل برو.png" alt="Product Image">
                </div> 
                <div class="w-67.5 flex gap-6 mt-6"> 
                    <img src="./assets/imgs/قماش-مورد-سنجل-برو.png" alt="Product Image"> 
                    <img src="./assets/imgs/single-pro-بلوزة.png" alt="Product Image">
                </div>
            </div> 
            <div class="flex-1">
                <div class="gap-[8px]">
                    <samp class="text-[#7B7A7A] text-[11px] font-family-body font-semibold tracking-[1.2px]">EDITORIAL COLLECTION</samp> 
                    <h1 class="text-[#323232] text-[48px] font-family-heading font-bold">Silk Lily Dress</h1> 
                    <samp class="text-[#40683F] text-[30px] font-family-body font-medium">$699.00</samp>
                </div> 
                <div class="mt-[40px] mb-[40px]"> 
                    <h2 class="text-[#323232] text-[14px] font-family-body font-semibold tracking-[1.4px]">COLOR</h2> 
                      <div class="mt-[16px] ">
                        <ul class="flex gap-[12px]">
                            <li><a href="#"><img src="./assets/imgs/لون-اسود.svg" alt="Black Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-ابيض.svg" alt="White Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-سكني.svg" alt="Red Color"></a></li>    
                        </ul>
                    </div>
                </div> 
                <div class="mb-10">
                    <div class="flex gap-[230px]">
                        <h2 class="text-[#323232] text-[14px] font-family-body font-semibold tracking-[1.4px]">SELECT SIZE</h2> 
                        <p class="text-[#7B7A7A] text-[12px] font-family-body font-semibold tracking-[-0.6px]">SIZE GUIDE</p> 
                    </div>
                     <div class="mt-[16px] ">
                        <button
                            class="text-[12px] lg:text-[14px] inline-block px-[40.5px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">S</a></button>
                        <button
                            class="text-[12px] lg:text-[14px] inline-block px-[40.5px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">M</a></button>
                        <button
                            class="text-[12px] lg:text-[14px] inline-block px-[40.5px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">L</a></button>
                        <button
                            class="text-[12px] lg:text-[14px] inline-block px-[40.5px] py-[9.4px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">XL</a></button>
                    </div>
                </div>
            </div>

        </div>
    </section>
    
</body>
</html>
