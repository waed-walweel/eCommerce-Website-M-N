<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Listing</title>
    <link rel="stylesheet" href="./assets/output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>

<body>

    <header class="py-[24px] md:py-[18px]  top-0 left-0  w-full bg-white z-10 ">
        <div class="container mx-auto flex items-center justify-between ">
            <div class="menue block lg:hidden">
                <a href="#"><img class="w-6 md:hidden" src="assets/imgs/menue.svg" alt="Menue"></a>
            </div>
            <div class="logo">
                <img src="assets/imgs/logo-mn.svg" alt="Logo">
            </div>
            <nav class="list hidden md:block">
                <ul class="flex gap-[30px] text-[16px] ">
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">HOME</a></li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">COLLECTIONS</a>
                    </li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">NEW ARRIVALS</a>
                    </li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">SHOP</a></li>
                    <li><a class="font-body text-[#323232] hover:text-[#A8D5A2] transition" href="#">ABOUT M&N</a></li>
                </ul>
            </nav>
            <div class="gap-[22px] flex">
                <div class="hidden md:block">
                    <input type="text" placeholder="Search"
                        class=" text-[12px] font-family-body text-[#7B7A7A] bg-[#F6F3F2] py-[9px] px-[24px] rounded-lg outline-none">
                    </input>
                    <div class="relative">
                        <a href="#" class="absolute bottom-4 right-1.5 ">
                            <img src="./assets/imgs/search-icon.svg" alt="Search Icon">
                        </a>
                    </div>
                </div>
                <div class="icons flex gap-[25.5px]">
                    <a class="hidden md:block" href="#"><img src="assets/imgs/heart.svg" alt="Cart"></a>
                    <a class="Wishlist  " href="#"><img src="assets/imgs/cart2.svg" alt="Wishlist"></a>
                </div>

            </div>

    </header>

    <section class=" mt-8">
        <div class="container mx-auto">
            <div>
                <div class="mb-[4px]">
                    <h2 class="text-[#0A0A0A] font-family-heading font-bold text-[18px]">
                        Filter By Category
                    </h2>
                </div>
                <div>
                    <p class="text-[12px] text-[#5F5E5E] font-family-body font-semibold">
                        REFINE YOUR SELECTION
                    </p>
                </div>
                <div class="mb-2">
                    <input type="text" placeholder="Apparel"
                        class=" text-[14px] font-family-body text-[#A8D5A2] bg-[#F6F3F2] py-3 px-[24px] rounded-lg outline-none">

                </div>
                <div class="mb-[40px] ">
                    <ul class=" gap-2 ">
                        <li><a class="font-family-body text-[12px] text-[#323232] hover:text-[#A8D5A2] transition"
                                href="#">Accessories</a></li>
                        <li><a class="font-family-body text-[12px] text-[#323232] hover:text-[#A8D5A2] transition"
                                href="#">Footwear</a></li>
                        <li><a class="font-family-body text-[12px] text-[#323232] hover:text-[#A8D5A2] transition"
                                href="#">Jewelry</a></li>
                        <li><a class="font-family-body text-[12px] text-[#323232] hover:text-[#A8D5A2] transition"
                                href="#">Limited Edition</a></li>
                    </ul>
                </div>

                <div class="">
                    <h2 class="text-[14px] text-[#323232] font-family-heading font-bold">
                        SIZE
                    </h2>
                    <div class="mt-[16px] mb-10">
                        <button
                            class="text-[14px] inline-block px-[11px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">S</a></button>
                        <button
                            class="text-[14px] inline-block px-[11.5px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">M</a></button>
                        <button
                            class="text-[14px] inline-block px-[11px] py-[8px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">L</a></button>
                        <button
                            class="text-[14px] inline-block px-[9px] py-[9.4px] border border-[#E6E1DE] text-[#323232] text-[#323232] bg-white hover:text-white hover:bg-[#40683F] transition duration-300 "><a
                                href="#">XL</a></button>
                    </div>
                </div>
                <div>
                    <h2 class="text-[14px] text-[#323232] font-family-heading font-bold">
                        COLORS
                    </h2>
                    <div class="mt-[16px] mb-[40px]">
                        <ul class="flex gap-[12px]">
                            <li><a href="#"><img src="./assets/imgs/لون-اسود.svg" alt="Black Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-ابيض.svg" alt="White Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-اخضر.svg" alt="Green Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-سكني.svg" alt="Red Color"></a></li>
                            <li><a href="#"><img src="./assets/imgs/لون-نيلي.svg" alt="Blue Color"></a></li>
                        </ul>
                    </div>
                </div>
                <div>
                    <h2 class="text-[14px] text-[#323232] font-family-heading font-bold">
                        PRICE RANGE
                    </h2>
                    <div class="mt-[16px] mb-[56px]">
                        <a href="#"><img class=" h-10" src="./assets/imgs/praice-range.svg" alt="Price Range"></a>
                    </div>
                </div>
                <div>
                    <button
                        class="py-[12px] px-[62.42px] bg-white text-[11px] font-family-body font-semibold inline-block border border-[#5F5E5E] hover:text-white hover:bg-[#5F5E5E]">CLEAR
                        ALL FILTERS</button>
                </div>
            </div>

        </div>
    </section>
</body>

</html>
